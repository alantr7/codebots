# Section for configuring the bots
bots:
  # Movement duration in bot ticks (10 ticks per second, smaller values make the bot move faster)
  # Default: 10
  movement_duration: 10

  # Rotation duration in ticks (10 ticks per second, smaller values make the bot rotate faster)
  # Default: 10
  rotation_duration: 10

  # Allow bots to break blocks
  # Default: true
  allow_block_breaking: true

  # Allow bots to place blocks
  # Default: true
  allow_block_placing: true

  # Allow bots to play sounds
  # Default: true
  allow_sounds_playing: true

  # Allow bots to use certain group of scripts
  # LOCAL - only scripts that belong to the bot
  # SHARED - only global scripts that are available to all bots
  # ALL - both local and shared scripts
  # Default: ALL
  allowed_scripts: "ALL"

  # Format for the bot's chat messages
  # Default: "&7[Bot] {message}"
  chat_format: "&7[Bot] {message}"

  # The maximum number of entries in bot's memory
  # This is not bot's working memory, but memory used to store data that persists through bot restarts
  max_memory_entries: 32

  # The maximum number of local programs that users can make per bot
  max_local_programs: 4

# Section for configuring scripting
scripts:
  # Whitelist allows users to access only configured websites. It is recommended to keep it enabled!
  # WARNING: Disabling this will allow users to discover your server's IPv4 address, or other servers (non Minecraft too) on your network!
  http_enable_url_whitelist: true
  http_url_whitelist:
    - api.open-meteo.com/*

# Section for configuring the editor
editor:
  url: "https://editor.myqualia.net"